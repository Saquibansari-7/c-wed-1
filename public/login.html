<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Login — Wedding</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #111; color: #e5e5e5; font-family: system-ui, sans-serif;
    }
    .box {
      width: 340px; background: #1a1a1a; border: 1px solid #333; border-radius: 14px;
      padding: 32px 28px;
    }
    .brand { text-align: center; margin-bottom: 24px; }
    .brand span { font-size: 24px; color: #c9a84c; }
    .brand h1 { font-size: 18px; margin: 8px 0 0; font-weight: 600; }
    label { display: block; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    input {
      width: 100%; background: #222; border: 1px solid #444; border-radius: 8px;
      padding: 11px 12px; color: #fff; font-size: 14px; outline: none; margin-bottom: 16px;
    }
    input:focus { border-color: #c9a84c; }
    button {
      width: 100%; background: #c9a84c; color: #111; padding: 12px; border: none;
      border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: .04em;
    }
    button:hover { background: #b8952f; }
    .err { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; margin-top: 6px; }
  </style>
</head>
<body>
  <form class="box" id="login-form">
    <div class="brand">
      <span>✦</span>
      <h1>Wedding Admin</h1>
    </div>
    <label>Username</label>
    <input id="user" autocomplete="username" required />
    <label>Password</label>
    <input id="pass" type="password" autocomplete="current-password" required />
    <button type="submit">Sign In</button>
    <p class="err" id="err"></p>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      try {
        const res = await fetch('/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: document.getElementById('user').value,
            pass: document.getElementById('pass').value
          })
        });
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          const j = await res.json().catch(() => ({}));
          errEl.textContent = j.error || 'Login failed';
        }
      } catch (e) {
        errEl.textContent = 'Server error — is the backend running?';
      }
    });
  </script>
</body>
</html>
